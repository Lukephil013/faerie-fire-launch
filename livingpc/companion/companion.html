<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  :root {
    --bg0:#06070f; --line:rgba(120,200,140,.30); --line2:rgba(120,200,140,.16);
    --fg:#e8edff; --muted:#a3c2ab; --green:#2fe3a0;
    --red:#ff6b8a; --amber:#ffd166; --grey:#5b648c;
    --card:rgba(14,24,18,.74); --card2:rgba(9,17,13,.68);
  }
  html,body { margin:0; height:100%; overflow:hidden;
    font-family:'Segoe UI',Helvetica,Arial,sans-serif; background:transparent; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#274a35; border-radius:3px; }
  ::-webkit-scrollbar-track { background:transparent; }

  #panel { display:flex; flex-direction:column; height:100%; color:var(--fg); position:relative;
    background-color:#06070f;
    background-image:
      radial-gradient(120% 80% at 50% 0%, rgba(10,28,17,.55) 0%, rgba(6,15,10,.74) 55%, rgba(4,8,6,.9) 100%),
      url("{{BACKGROUND_DATA_URL}}");
    background-size: cover, cover;
    background-position: center, center 30%;
    background-repeat: no-repeat, no-repeat;
    border:1px solid var(--line); border-radius:18px; overflow:hidden; }

  /* Ambient light motes drifting over the background, same as the review GUI. */
  #motes { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  #motes span { position:absolute; bottom:-10px; display:block; border-radius:50%;
    background:radial-gradient(circle, rgba(255,244,214,.95) 0%, rgba(255,223,150,.55) 45%, rgba(255,223,150,0) 75%);
    box-shadow:0 0 6px 1px rgba(255,224,160,.5);
    animation: mote-rise linear infinite; }
  @keyframes mote-rise {
    0%   { transform:translate(0,0) scale(.7); opacity:0; }
    8%   { opacity:.85; }
    50%  { transform:translate(var(--drift,12px), -52vh) scale(1); }
    92%  { opacity:.6; }
    100% { transform:translate(calc(var(--drift,12px) * 2), -108vh) scale(.6); opacity:0; }
  }

  header { flex:0 0 auto; display:flex; align-items:center; gap:9px;
    padding:14px 16px 12px; position:relative; z-index:1; -webkit-app-region:drag; user-select:none; }
  header .avatar { width:42px; height:42px; border-radius:10px; object-fit:cover;
    border:1px solid var(--line); background:rgba(10,14,30,.6); flex:none; }
  header .logo { font-size:14.5px; font-weight:600; color:var(--green);
    text-shadow:0 0 12px rgba(47,227,160,.4); letter-spacing:.3px; }
  .window-button { flex:none; -webkit-app-region:no-drag;
    width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    font-size:13px; line-height:1; cursor:pointer; border-radius:8px; color:#cfe0ff;
    border:1px solid var(--line); background:rgba(10,14,30,.6); transition:all .15s ease; }
  #filesToggle { margin-left:auto; }
  #filesToggle.active { border-color:rgba(120,200,140,.55); background:rgba(20,34,26,.9); color:var(--green); }
  .window-button:hover { border-color:rgba(120,200,140,.55); background:rgba(20,34,26,.9); color:var(--green); }

  #workspace { min-height:0; flex:1; display:flex; position:relative; z-index:1; -webkit-app-region:no-drag; }
  #sidebar { width:164px; flex:none; padding:8px 8px 12px; border-right:1px solid var(--line2);
    background:linear-gradient(180deg,rgba(4,16,10,.68),rgba(3,11,8,.5)); overflow-y:auto; }
  #newChatWrap { position:relative; }
  #newChat { width:100%; padding:8px 9px; border-radius:10px; cursor:pointer; color:var(--green);
    border:1px solid var(--line); background:rgba(10,31,20,.7); font:600 12px inherit; }
  #newChatMenu { position:absolute; z-index:8; top:39px; left:0; width:224px; padding:5px;
    border:1px solid var(--line); border-radius:11px; background:rgba(5,17,11,.98);
    box-shadow:0 10px 28px rgba(0,0,0,.45); }
  #newChatMenu.hidden { display:none; }
  .new-chat-option { display:block; width:100%; padding:9px 10px; border:0; border-radius:8px;
    background:transparent; color:var(--fg); text-align:left; cursor:pointer; font:12px/1.3 inherit; }
  .new-chat-option:hover { background:rgba(30,58,42,.65); }
  .new-chat-option small { display:block; margin-top:2px; color:var(--muted); font-size:10.5px; }
  #chatList { margin-top:9px; display:flex; flex-direction:column; gap:5px; }
  .chat-row { display:flex; align-items:center; gap:4px; border-radius:9px; }
  .chat-row:hover { background:rgba(30,58,42,.25); }
  .chat-link { width:100%; padding:8px 9px; border:1px solid transparent; border-radius:9px;
    background:transparent; color:var(--muted); text-align:left; font:12px/1.3 inherit; cursor:pointer;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chat-link:hover { background:rgba(30,58,42,.35); color:var(--fg); }
  .chat-link.active { border-color:var(--line); background:rgba(30,58,42,.58); color:var(--fg); }
  .chat-delete { flex:none; width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    border:1px solid transparent; border-radius:8px; background:transparent; color:var(--grey);
    cursor:pointer; font:14px/1 inherit; opacity:.45; }
  .chat-row:hover .chat-delete { opacity:1; }
  .chat-delete:hover { color:var(--red); border-color:rgba(255,107,138,.35);
    background:rgba(255,107,138,.08); }
  #chatPane { flex:1; min-width:0; display:flex; flex-direction:column; }
  #chatModeBar { flex:0 0 auto; display:flex; justify-content:flex-end; padding:1px 14px 2px; }
  #proposalToggle { border:1px solid var(--line2); border-radius:999px; padding:4px 9px;
    background:rgba(7,20,13,.68); color:var(--muted); cursor:pointer; font:10.5px inherit; }
  #proposalToggle.on { color:var(--green); border-color:var(--line); }
  #proposalToggle:hover { background:rgba(20,34,26,.9); }

  #log { flex:1 1 auto; overflow-y:auto; padding:6px 14px; user-select:text; cursor:text; }
  .msg { margin:6px 0; font-size:13px; line-height:1.5; max-width:88%; padding:9px 12px;
    border-radius:13px; white-space:pre-wrap; overflow-wrap:anywhere; animation:rise .2s ease;
    user-select:text; cursor:text; }
  @keyframes rise { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
  .me { margin-left:auto; background:rgba(30,58,42,.78); color:#eaf0ff;
    border:1px solid var(--line); border-bottom-right-radius:3px; }
  .ai { margin-right:auto; background:var(--card); color:#dfe9ff;
    border:1px solid rgba(120,220,170,.22); border-bottom-left-radius:3px; }
  .typing { margin-right:auto; display:flex; gap:4px; padding:11px 14px; }
  .typing i { width:5px; height:5px; border-radius:50%; background:var(--green); display:block;
    opacity:.5; animation:typing-bounce 1.1s ease-in-out infinite; }
  .typing i:nth-child(2) { animation-delay:.15s; } .typing i:nth-child(3) { animation-delay:.3s; }
  @keyframes typing-bounce { 0%,60%,100% { transform:translateY(0); opacity:.4; }
    30% { transform:translateY(-3px); opacity:1; } }

  #textRow { flex:0 0 auto; display:flex; gap:8px; padding:10px 14px 14px;
    align-items:flex-end; border-top:1px solid var(--line2); }
  #textIn { flex:1; font-size:13px; font-family:inherit; border-radius:12px; color:var(--fg);
    border:1px solid var(--line); background:var(--card2); box-sizing:border-box;
    padding:9px 13px; outline:none; resize:none; min-height:38px; max-height:120px;
    line-height:1.45; overflow-y:auto; white-space:pre-wrap; overflow-wrap:anywhere; }
  #textIn:focus { border-color:var(--green); box-shadow:0 0 10px rgba(47,227,160,.22); }
  #textIn:disabled { opacity:.5; }
  #textSend { flex:none; font-family:inherit; cursor:pointer; border-radius:12px; font-size:14px;
    padding:9px 15px; border:1px solid var(--line); background:rgba(10,14,30,.85); color:#cfe0ff;
    transition:all .15s ease; }
  #textSend:hover:not(:disabled) { border-color:rgba(120,200,140,.55); background:rgba(20,34,26,.9); }
  #textSend:disabled { opacity:.45; cursor:default; }

  /* Attachments: pending chips above the composer */
  #attachRow { flex:0 0 auto; display:none; flex-wrap:wrap; gap:6px; padding:8px 14px 0; }
  #attachRow.has-items { display:flex; }
  .attach-chip { display:flex; align-items:center; gap:6px; max-width:210px; padding:4px 8px;
    border:1px solid var(--line); border-radius:9px; background:var(--card2);
    font-size:11.5px; color:var(--muted); }
  .attach-chip .chip-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .attach-chip img { width:26px; height:26px; object-fit:cover; border-radius:5px;
    border:1px solid var(--line2); flex:none; }
  .attach-chip .chip-x { flex:none; cursor:pointer; color:var(--grey); font-size:13px; line-height:1; }
  .attach-chip .chip-x:hover { color:var(--red); }
  #attachBtn { flex:none; font-family:inherit; cursor:pointer; border-radius:12px; font-size:14px;
    padding:9px 11px; border:1px solid var(--line); background:rgba(10,14,30,.85); color:#cfe0ff;
    transition:all .15s ease; }
  #attachBtn:hover { border-color:rgba(120,200,140,.55); background:rgba(20,34,26,.9); color:var(--green); }

  /* Projects tab: right-side panel over the filing engine's projects folder */
  #filesPane { width:236px; flex:none; display:flex; flex-direction:column; min-height:0;
    border-left:1px solid var(--line2);
    background:linear-gradient(180deg,rgba(4,16,10,.68),rgba(3,11,8,.5)); }
  #filesPane.hidden { display:none; }
  #filesHead { flex:0 0 auto; display:flex; align-items:center; gap:6px; padding:10px 10px 8px; }
  #filesHead .files-title { font:600 12px inherit; color:var(--green); letter-spacing:.3px; flex:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #filesOpenFolder, #fileBack { flex:none; font:12px inherit; cursor:pointer; border-radius:8px;
    color:#cfe0ff; border:1px solid var(--line); background:rgba(10,14,30,.6); padding:4px 8px; }
  #filesOpenFolder:hover, #fileBack:hover { border-color:rgba(120,200,140,.55);
    background:rgba(20,34,26,.9); color:var(--green); }
  #filesList { flex:1 1 auto; overflow-y:auto; padding:0 8px 12px; display:flex;
    flex-direction:column; gap:5px; }
  .file-link { padding:8px 9px; border:1px solid transparent; border-radius:9px; background:transparent;
    color:var(--muted); text-align:left; font:12px/1.35 inherit; cursor:pointer; }
  .file-link:hover { background:rgba(30,58,42,.35); color:var(--fg); }
  .file-link .file-title { color:var(--fg); font-weight:600; display:block; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; }
  .file-link .file-summary { display:block; margin-top:2px; font-size:11px; opacity:.8;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .files-empty { padding:10px 9px; font-size:11.5px; line-height:1.5; color:var(--muted); }
  #fileView { flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
  #fileView.hidden { display:none; }
  #fileBody { flex:1 1 auto; overflow-y:auto; margin:0; padding:2px 12px 12px; font:11.5px/1.55 inherit;
    color:#dfe9ff; white-space:pre-wrap; overflow-wrap:anywhere; user-select:text; cursor:text; }

  /* Proactive reflection: the companion volunteers a belief + a refine box */
  .reflect-row { margin-top:8px; display:flex; gap:6px; align-items:center; }
  .reflect-row input { flex:1; font-size:12px; border-radius:8px; color:var(--fg);
    border:1px solid var(--line); background:var(--card2); padding:5px 9px; outline:none; }
  .reflect-row input:focus { border-color:var(--green); box-shadow:0 0 8px rgba(47,227,160,.2); }
  .reflect-row button { font-size:12px; cursor:pointer; border-radius:8px; color:#cfe0ff;
    border:1px solid var(--line); background:rgba(10,14,30,.85); padding:5px 11px; }
  .reflect-saved { color:var(--green); font-size:12px; }
  @media (max-width:520px) {
    #sidebar { width:116px; }
    header .avatar { width:34px; height:34px; }
    .msg { max-width:92%; }
  }
</style></head>
<body><div id="panel">
  <div id="motes">
    <span style="left:8%;  width:3px; height:3px;  --drift:14px;  animation-duration:15s; animation-delay:-2s;"></span>
    <span style="left:20%; width:2px; height:2px;  --drift:-10px; animation-duration:19s; animation-delay:-7s;"></span>
    <span style="left:34%; width:4px; height:4px;  --drift:9px;   animation-duration:16s; animation-delay:-4s;"></span>
    <span style="left:48%; width:2px; height:2px;  --drift:-8px;  animation-duration:21s; animation-delay:-11s;"></span>
    <span style="left:62%; width:3px; height:3px;  --drift:12px;  animation-duration:17s; animation-delay:-1s;"></span>
    <span style="left:76%; width:2px; height:2px;  --drift:-11px; animation-duration:22s; animation-delay:-9s;"></span>
    <span style="left:88%; width:3px; height:3px;  --drift:8px;   animation-duration:18s; animation-delay:-5s;"></span>
    <span style="left:56%; width:2px; height:2px;  --drift:6px;   animation-duration:14s; animation-delay:-13s;"></span>
  </div>
  <!-- pywebview-drag-region is pywebview's real drag hook for frameless
       windows; -webkit-app-region in the CSS is Electron-only and ignored. -->
  <header class="pywebview-drag-region">
    <img class="avatar" id="avatarArt" src="{{AVATAR_DATA_URL}}" alt="Faerie Fire">
    <span class="logo">✦ Faerie Fire</span>
    <div id="filesToggle" class="window-button" title="Project docs">🗀</div>
    <div id="minimize" class="window-button" title="Minimize">—</div>
    <div id="maximize" class="window-button" title="Maximize/restore">⤢</div>
  </header>
  <div id="workspace">
    <aside id="sidebar">
      <div id="newChatWrap">
        <button id="newChat">＋ New chat</button>
        <div id="newChatMenu" class="hidden">
          <button class="new-chat-option" data-proposals="true">Growth + Investigation-aware
            <small>Proactively offers approval-only proposals.</small></button>
          <button class="new-chat-option" data-proposals="false">Proposal-free
            <small>Conversation without Growth or Investigation cards.</small></button>
        </div>
      </div>
      <div id="chatList"></div>
    </aside>
    <main id="chatPane">
      <div id="chatModeBar"><button id="proposalToggle" class="on">✦ Proposals on</button></div>
      <div id="log"></div>
      <div id="attachRow"></div>
      <div id="textRow">
        <button id="attachBtn" title="Attach a file (or paste an image with Ctrl+V)">📎</button>
        <textarea id="textIn" rows="1" placeholder="Type to Faerie…" autocomplete="off" spellcheck="true"></textarea>
        <button id="textSend" title="Send">Send</button>
      </div>
    </main>
    <aside id="filesPane" class="hidden">
      <div id="filesHead">
        <span class="files-title" id="filesTitle">Project docs</span>
        <button id="fileBack" class="hidden" title="Back to the list">←</button>
        <button id="filesOpenFolder" title="Open the projects folder in Explorer">Open folder</button>
      </div>
      <div id="filesList"></div>
      <div id="fileView" class="hidden"><pre id="fileBody"></pre></div>
    </aside>
  </div>
</div>
<script>
function fit(){ document.getElementById('panel').style.height=window.innerHeight+'px'; }
window.addEventListener('resize',fit);

let lastUiError=null;
let activeChatId=null;
let chats=[];
let proposalsEnabled=true;
let chatStateLoaded=false;
let chatStateLoading=false;
const debugEvents=[];
function traceUi(type,detail){ debugEvents.push({at:new Date().toISOString(),type,detail});
  if(debugEvents.length>100)debugEvents.shift(); setTimeout(reportDebugState,0); }

function addMessage(role,text){ const d=document.createElement('div');
  d.className='msg '+(role==='me'?'me':'ai'); d.textContent=text;
  const log=document.getElementById('log'); log.appendChild(d); log.scrollTop=1e9;
  traceUi('message',{role:role==='me'?'user':'companion',chars:String(text||'').length}); }
window.addMessage=addMessage;

function greeting(){ addMessage('ai',"Hi — I'm Faerie. Type a message to get started."); }
function visibleMessageText(value){
  const text=String(value==null?'':value), marker='\n\n<ATTACHED_DOCUMENT_CONTEXT>';
  const index=text.indexOf(marker);
  return index>=0?text.slice(0,index):text;
}
function renderChats(){ const list=document.getElementById('chatList'); list.innerHTML='';
  chats.forEach(chat=>{ const row=document.createElement('div'); row.className='chat-row';
    const b=document.createElement('button'); b.className='chat-link'+
      (chat.id===activeChatId?' active':''); b.textContent=chat.title||'New chat'; b.title=b.textContent;
    b.onclick=()=>openChat(chat.id);
    const del=document.createElement('button'); del.className='chat-delete'; del.textContent='×';
    del.title='Delete conversation'; del.onclick=e=>{ e.stopPropagation(); deleteChat(chat.id, chat.title||'New chat'); };
    row.oncontextmenu=e=>{ e.preventDefault(); deleteChat(chat.id, chat.title||'New chat'); };
    row.appendChild(b); row.appendChild(del); list.appendChild(row); }); }
function applyChatState(state){ if(!state||state.ok===false)return;
  activeChatId=state.active_chat_id; chats=state.chats||[];
  proposalsEnabled=state.proposals_enabled!==false; renderChats(); renderProposalMode();
  const log=document.getElementById('log'); log.innerHTML='';
  (state.messages||[]).forEach(m=>addMessage(m.role==='user'?'me':'ai',visibleMessageText(m.content)));
  if(!(state.messages||[]).length)greeting(); }
function openChat(id){ if(id===activeChatId)return;
  if(window.pywebview&&pywebview.api&&pywebview.api.switch_chat)
    pywebview.api.switch_chat(id).then(applyChatState).catch(()=>{}); }
function deleteChat(id,title){
  if(!confirm('Delete conversation "'+title+'"?')) return;
  if(window.pywebview&&pywebview.api&&pywebview.api.delete_chat)
    pywebview.api.delete_chat(id).then(applyChatState).catch(()=>{});
}
function loadChatState(){
  if(chatStateLoaded||chatStateLoading)return;
  if(!(window.pywebview&&pywebview.api&&pywebview.api.chat_state))return;
  chatStateLoading=true;
  pywebview.api.chat_state().then(state=>{
    chatStateLoading=false;
    if(state&&state.ok!==false){chatStateLoaded=true;applyChatState(state);}
  }).catch(()=>{chatStateLoading=false;});
}

function showTyping(on){ const log=document.getElementById('log');
  let t=document.getElementById('typing-indicator');
  if(on){ if(t) return; t=document.createElement('div'); t.id='typing-indicator'; t.className='msg typing';
    t.innerHTML='<i></i><i></i><i></i>'; log.appendChild(t); log.scrollTop=1e9; }
  else if(t){ t.remove(); } }

function showExchange(r){ showTyping(false); if(!r||r.empty) return;
  // the user's message was already rendered by sendText — only add the reply
  if(r.text) addMessage('ai', r.text);
  if(r.chats){ chats=r.chats; activeChatId=r.active_chat_id||activeChatId;
    proposalsEnabled=r.proposals_enabled!==false; renderChats(); renderProposalMode(); }
  if(filesOpen) filesRefresh(); } // a /file may have created or updated a doc

function resizeComposer(){ const box=document.getElementById('textIn'); box.style.height='auto';
  box.style.height=Math.min(box.scrollHeight,120)+'px'; }

// --- attachments: files via the 📎 picker, photos via Ctrl+V ------------------
let pendingAttachments=[];
function renderAttachments(){
  const row=document.getElementById('attachRow'); row.innerHTML='';
  row.classList.toggle('has-items',pendingAttachments.length>0);
  pendingAttachments.forEach((a,i)=>{
    const chip=document.createElement('div'); chip.className='attach-chip';
    if(a.kind==='image'){ const im=document.createElement('img');
      im.src='data:'+(a.media_type||'image/png')+';base64,'+a.data; chip.appendChild(im); }
    const nm=document.createElement('span'); nm.className='chip-name';
    nm.textContent=a.name||(a.kind==='image'?'pasted image':'file'); chip.appendChild(nm);
    const x=document.createElement('span'); x.className='chip-x'; x.textContent='×';
    x.title='Remove'; x.onclick=()=>{ pendingAttachments.splice(i,1); renderAttachments(); };
    chip.appendChild(x); row.appendChild(chip); });
}
function addAttachment(a){ if(!a) return;
  pendingAttachments.push(a); renderAttachments();
  traceUi('attach',{kind:a.kind,chars:a.text?a.text.length:0}); }
document.getElementById('attachBtn').onclick=()=>{
  if(window.pywebview&&pywebview.api&&pywebview.api.attach_file)
    pywebview.api.attach_file().then(r=>{
      if(r&&r.ok) addAttachment(r.attachment);
      else if(r&&r.message) addMessage('ai','('+r.message+')');
    }).catch(()=>{});
};
document.addEventListener('paste',e=>{
  const items=e.clipboardData&&e.clipboardData.items; if(!items) return;
  for(const it of items){
    if(it.type&&it.type.startsWith('image/')){
      const f=it.getAsFile(); if(!f) continue;
      if(f.size>4500000){ addMessage('ai','(that image is too large for the vision API — max ~4.5MB)'); continue; }
      const rd=new FileReader();
      rd.onload=()=>addAttachment({kind:'image',name:'pasted image',media_type:it.type,
        data:String(rd.result).split(',')[1]});
      rd.readAsDataURL(f); e.preventDefault();
    }
  }
});

function sendText(){
  const box=document.getElementById('textIn'), btn=document.getElementById('textSend');
  const text=box.value.trim(); if(!text&&!pendingAttachments.length) return;
  const atts=pendingAttachments; pendingAttachments=[]; renderAttachments();
  box.value=''; resizeComposer(); box.disabled=true; btn.disabled=true;
  const label=text+(atts.length?(text?'\n':'')+'[attached: '+atts.map(a=>a.name||a.kind).join(', ')+']':'');
  addMessage('me', label);   // show immediately; the reply arrives when it arrives
  showTyping(true);
  if(window.pywebview&&pywebview.api&&pywebview.api.send){
    pywebview.api.send(text, atts).then(r=>{ box.disabled=false; btn.disabled=false; box.focus(); showExchange(r); })
      .catch(()=>{ box.disabled=false; btn.disabled=false; showTyping(false); box.focus(); });
  } else { box.disabled=false; btn.disabled=false; showTyping(false); }
}
document.getElementById('textSend').onclick=sendText;
document.getElementById('textIn').addEventListener('input',resizeComposer);
document.getElementById('textIn').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendText(); }
});

const newChatMenu=document.getElementById('newChatMenu');
document.getElementById('newChat').onclick=e=>{
  e.stopPropagation(); newChatMenu.classList.toggle('hidden');
};
document.querySelectorAll('.new-chat-option').forEach(option=>{
  option.onclick=e=>{ e.stopPropagation(); newChatMenu.classList.add('hidden');
    const enabled=option.dataset.proposals==='true';
    if(window.pywebview&&pywebview.api&&pywebview.api.new_chat)
      pywebview.api.new_chat(enabled).then(applyChatState).catch(()=>{});
  };
});
document.addEventListener('click',()=>newChatMenu.classList.add('hidden'));
function renderProposalMode(){ const button=document.getElementById('proposalToggle');
  button.classList.toggle('on',proposalsEnabled);
  button.textContent=proposalsEnabled?'✦ Proposals on · Growth + Investigations':'Proposals off';
  button.title=proposalsEnabled?'Disable Growth and Investigation proposals for this chat':
    'Enable Growth and Investigation proposals for this chat';
}
document.getElementById('proposalToggle').onclick=()=>{
  if(window.pywebview&&pywebview.api&&pywebview.api.set_chat_proposals_enabled)
    pywebview.api.set_chat_proposals_enabled(!proposalsEnabled).then(applyChatState).catch(()=>{});
};

document.getElementById('minimize').onclick=()=>{
  traceUi('minimize',{});
  if(window.pywebview&&pywebview.api&&pywebview.api.minimize)pywebview.api.minimize().catch(()=>{});
};

document.getElementById('maximize').onclick=()=>{
  traceUi('maximize',{});
  if(window.pywebview&&pywebview.api&&pywebview.api.toggle_maximize) pywebview.api.toggle_maximize().catch(()=>{});
};
document.querySelector('header').addEventListener('dblclick', e=>{

    if(window.pywebview&&pywebview.api&&pywebview.api.toggle_maximize) pywebview.api.toggle_maximize().catch(()=>{});

});
// Window buttons live inside the drag region: stop mousedown from starting a
// drag so their clicks always land.
document.querySelectorAll('.window-button').forEach(el=>{
  el.addEventListener('mousedown', e=>e.stopPropagation());
});

// --- Projects tab: browse the filing engine's project docs -------------------
let filesOpen=false;
function filesRefresh(){
  if(!(window.pywebview&&pywebview.api&&pywebview.api.list_projects))return;
  pywebview.api.list_projects().then(r=>{
    const list=document.getElementById('filesList'); list.innerHTML='';
    const docs=(r&&r.docs)||[];
    if(!docs.length){ const d=document.createElement('div'); d.className='files-empty';
      d.textContent='No project docs yet — /file a thought and it will land here.';
      list.appendChild(d); return; }
    docs.forEach(doc=>{ const b=document.createElement('button'); b.className='file-link';
      const t=document.createElement('span'); t.className='file-title'; t.textContent=doc.title||doc.slug;
      b.appendChild(t);
      if(doc.summary){ const s=document.createElement('span'); s.className='file-summary';
        s.textContent=doc.summary; b.appendChild(s); }
      b.onclick=()=>fileOpen(doc.slug,doc.title||doc.slug); list.appendChild(b); });
  }).catch(()=>{});
}
function fileOpen(slug,title){
  if(!(window.pywebview&&pywebview.api&&pywebview.api.read_project))return;
  pywebview.api.read_project(slug).then(r=>{
    document.getElementById('filesTitle').textContent=title;
    document.getElementById('fileBody').textContent=(r&&r.text)||'(empty)';
    document.getElementById('filesList').classList.add('hidden');
    document.getElementById('fileView').classList.remove('hidden');
    document.getElementById('fileBack').classList.remove('hidden');
    traceUi('file-open',{slug});
  }).catch(()=>{});
}
function fileCloseView(){
  document.getElementById('filesTitle').textContent='Project docs';
  document.getElementById('fileView').classList.add('hidden');
  document.getElementById('fileBack').classList.add('hidden');
  document.getElementById('filesList').classList.remove('hidden');
}
document.getElementById('filesToggle').onclick=()=>{
  filesOpen=!filesOpen; traceUi('files-toggle',{open:filesOpen});
  document.getElementById('filesPane').classList.toggle('hidden',!filesOpen);
  document.getElementById('filesToggle').classList.toggle('active',filesOpen);
  if(filesOpen){ fileCloseView(); filesRefresh(); }
};
document.getElementById('fileBack').onclick=fileCloseView;
document.getElementById('filesOpenFolder').onclick=()=>{
  if(window.pywebview&&pywebview.api&&pywebview.api.open_projects_folder)
    pywebview.api.open_projects_folder().catch(()=>{});
};

// --- proactive reflection: the companion volunteers a belief + a refine box ---
function showReflection(r){ if(!r||!r.text) return;
  const log=document.getElementById('log');
  const wrap=document.createElement('div'); wrap.className='msg ai';
  const p=document.createElement('div'); p.textContent=r.text; wrap.appendChild(p);
  const row=document.createElement('div'); row.className='reflect-row';
  const box=document.createElement('input'); box.type='text'; box.value=r.statement||'';
  const save=document.createElement('button'); save.textContent='Save my words';
  save.onclick=()=>{ const t=box.value.trim(); if(!t) return;
    if(window.pywebview&&pywebview.api&&pywebview.api.refine_reflection)
      pywebview.api.refine_reflection(r.id,t).catch(()=>{});
    row.innerHTML='<span class="reflect-saved">Saved — thanks.</span>'; };
  row.appendChild(box); row.appendChild(save); wrap.appendChild(row);
  log.appendChild(wrap); log.scrollTop=1e9; traceUi('reflection',{id:r.id}); }
function pollReflection(){ if(window.pywebview&&pywebview.api&&pywebview.api.get_reflection){
  pywebview.api.get_reflection().then(r=>{ if(r&&r.text) showReflection(r); }).catch(()=>{}); } }
setInterval(pollReflection, 45000);

function debugRect(id){ const el=document.getElementById(id); if(!el)return null;
  const r=el.getBoundingClientRect(); return {x:r.x,y:r.y,width:r.width,height:r.height}; }
function debugState(){ return {
  messageCount:document.querySelectorAll('#log .msg').length,
  messageShapes:Array.from(document.querySelectorAll('#log .msg')).map(el=>({
    role:el.classList.contains('me')?'user':'companion',chars:el.textContent.length})),
  activeChatId,chatCount:chats.length,
  viewport:{innerWidth:window.innerWidth,innerHeight:window.innerHeight,
    outerWidth:window.outerWidth,outerHeight:window.outerHeight,
    devicePixelRatio:window.devicePixelRatio,visibility:document.visibilityState},
  screen:{width:screen.width,height:screen.height,availWidth:screen.availWidth,
    availHeight:screen.availHeight,colorDepth:screen.colorDepth},
  rects:{panel:debugRect('panel'),log:debugRect('log'),textRow:debugRect('textRow')},
  log:{clientHeight:document.getElementById('log').clientHeight,
    scrollHeight:document.getElementById('log').scrollHeight,
    scrollTop:document.getElementById('log').scrollTop},
  lastError:lastUiError,
  events:debugEvents
}; }
function reportDebugState(){ if(window.pywebview&&pywebview.api&&pywebview.api.report_ui_state){
  pywebview.api.report_ui_state(debugState()).catch(()=>{}); } }
window.addEventListener('error',e=>{ lastUiError={type:'error',message:String(e.message||''),
  source:String(e.filename||''),line:e.lineno||0,column:e.colno||0}; traceUi('error',lastUiError); });
window.addEventListener('unhandledrejection',e=>{ lastUiError={type:'unhandledrejection',
  message:String(e.reason&&e.reason.message?e.reason.message:e.reason||'')}; traceUi('error',lastUiError); });
window.addEventListener('pywebviewready',()=>{ loadChatState(); reportDebugState(); });
setInterval(reportDebugState,5000);

fit();
[100,300,700,1400,2500].forEach(ms=>setTimeout(fit,ms));
[0,100,300,700,1400,2500,5000].forEach(ms=>setTimeout(loadChatState,ms));
window.addEventListener('load',fit);

document.getElementById('textIn').focus();
</script></body></html>
