<!doctype html>
<html><head><meta charset="utf-8"><title>Faerie Agent</title>
<style>
@font-face{font-family:'Atkinson Hyperlegible';src:url('assets/fonts/AtkinsonHyperlegible-Regular.ttf') format('truetype');font-style:normal;font-weight:400;font-display:swap}
@font-face{font-family:'Atkinson Hyperlegible';src:url('assets/fonts/AtkinsonHyperlegible-Bold.ttf') format('truetype');font-style:normal;font-weight:700;font-display:swap}
:root{--bg:#06110c;--panel:rgba(9,29,20,.92);--line:#24543d;--fg:#dcebe2;--muted:#8ba797;--green:#45efb1;--cyan:#76e7da;--red:#ff7891;--app-font:'Atkinson Hyperlegible','Malgun Gothic','Segoe UI Symbol',sans-serif}
*{box-sizing:border-box}body{margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;color:var(--fg);font:14px/1.5 var(--app-font);background:radial-gradient(circle at 70% 0,#123b2a 0,transparent 45%),var(--bg);user-select:text}button,input,textarea,select,option{font-family:var(--app-font)}button,select,option{user-select:none}.msg,.prompt,.hint,.item{user-select:text;cursor:text}.msg strong,.prompt strong{font-weight:700}
.text-context-menu{position:fixed;z-index:9999;min-width:145px;padding:5px;border:1px solid var(--line);border-radius:9px;background:#07150e;box-shadow:0 12px 30px #0009;display:grid}.text-context-menu button{border:0;background:transparent;text-align:left}.text-context-menu button:hover{background:#153527}
header{height:56px;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--line)}.drag-handle{align-self:stretch;display:flex;align-items:center;flex:1;cursor:move}.brand{font-weight:700;color:var(--green);letter-spacing:.5px}.kind{color:var(--muted);margin-left:10px}.hbtn{margin-left:8px;min-width:38px;font-size:17px;line-height:1}#close:hover{color:#ffdce3;border-color:#713044;background:#32151d}
main{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden}.chat-scroll{flex:1 1 auto;min-height:0;overflow:auto;padding:18px;width:100%;max-width:820px;margin:0 auto}.composer{flex:0 0 auto;border-top:1px solid var(--line);background:var(--panel);padding:12px 18px}.composer-inner{max-width:820px;margin:0 auto}.composer textarea{max-height:34vh}.composer .row{margin-top:8px}.prompt{font-size:18px;line-height:1.4;margin:4px 0 15px}.hint,.status{color:var(--muted);font-size:12px}.messages{display:flex;flex-direction:column;gap:9px;margin:14px 0}.msg{padding:10px 12px;border:1px solid var(--line);border-radius:12px;white-space:pre-wrap;max-width:88%}.assistant{align-self:flex-start;background:rgba(39,101,73,.25)}.user{align-self:flex-end;background:rgba(69,239,177,.11)}
.msg.thinking{color:var(--cyan);border-color:rgba(118,231,218,.58);background:rgba(118,231,218,.1);box-shadow:0 0 18px rgba(118,231,218,.08)}
.chat-thinking{display:inline-flex;align-items:center;gap:8px}.thinking-dots{display:inline-flex;align-items:center;gap:4px}.thinking-dots i{width:5px;height:5px;border-radius:50%;background:currentColor;animation:thinking-dot 1.1s ease-in-out infinite}.thinking-dots i:nth-child(2){animation-delay:.16s}.thinking-dots i:nth-child(3){animation-delay:.32s}@keyframes thinking-dot{0%,70%,100%{opacity:.3;transform:translateY(0)}35%{opacity:1;transform:translateY(-3px)}}
@media(prefers-reduced-motion:reduce){.thinking-dots i{animation:none;opacity:.72}}
.sendfail{color:var(--red);font-size:12px;margin:4px 0}
.plan-node{padding:7px 0;border-bottom:1px solid rgba(70,120,90,.22)}.plan-node:last-child{border:0}.plan-node b{color:var(--cyan);font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin-right:6px}.plan-desc{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.45}.plan-chip{display:inline-block;border:1px solid var(--line);border-radius:20px;padding:1px 8px;font-size:11px;color:var(--muted);margin-left:6px}.plan-rationale{color:var(--muted);font-size:12px;margin-bottom:9px;line-height:1.5}
textarea,select{width:100%;background:#081a12;color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit}textarea{field-sizing:content;min-height:68px;max-height:58vh;overflow-y:auto;resize:none;line-height:1.5}button{background:#10291d;color:var(--fg);border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer}button.primary{background:var(--green);color:#032117;border-color:var(--green);font-weight:700}button.danger{color:#ffdce3;border-color:#713044}.row{display:flex;gap:8px;justify-content:flex-end;margin-top:9px;flex-wrap:wrap}.draft,.staged{margin-top:16px;padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--panel)}label.cap{display:block;color:var(--cyan);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:7px}.item{padding:9px 0;border-bottom:1px solid rgba(70,120,90,.25);overflow-wrap:anywhere}.item:last-child{border:0}.item input{margin-right:8px}.error{color:var(--red)}
</style></head><body>
<header><div class="drag-handle pywebview-drag-region" title="Drag to move this agent"><span class="brand">Faerie Fire</span><span class="kind" id="kind">Agent</span></div><button class="hbtn" id="minimize" title="Minimize agent" aria-label="Minimize agent">−</button><button class="hbtn" id="expand" title="Expand or shrink agent" aria-label="Expand or shrink agent">⤢</button><button class="hbtn" id="close" title="Close agent" aria-label="Close agent">×</button></header>
<main id="app"><div class="status">Waking the agent…</div></main>
<script>
const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let STATE=null; const api=()=>window.pywebview&&pywebview.api;
function conversationHtml(value){return esc(value).replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')}
function thinkingHtml(label){return '<span class="chat-thinking"><span>'+esc(label||'Thinking…')+'</span><span class="thinking-dots" aria-hidden="true"><i></i><i></i><i></i></span></span>'}
function grow(t){if(!t||t.tagName!=='TEXTAREA')return;t.style.height='auto';t.style.height=Math.min(t.scrollHeight,Math.round(innerHeight*.58))+'px'}
document.addEventListener('input',e=>grow(e.target));
function messages(items){return '<div class="messages">'+(items||[]).map(m=>'<div class="msg '+esc(m.role)+'">'+conversationHtml(m.content)+'</div>').join('')+'</div>'}
// Every agent mode renders as a scrolling conversation area with the reply
// composer pinned to the bottom of the window, matching the main chats.
function shell(scrollHtml,composerHtml){return '<div class="chat-scroll">'+scrollHtml+'</div><div class="composer"><div class="composer-inner">'+composerHtml+'</div></div>'}
function typeLabel(t){return {umbrella:'Soul',overgoal:'Root',subgoal:'Branch',task:'Leaf'}[String(t||'').toLowerCase()]||(t||'node')}
function draftView(d){
 d=d||{};const nodes=Array.isArray(d.nodes)?d.nodes:[];
 if(!nodes.length)return '<div class="hint">No plan nodes yet — keep answering and the plan will take shape here.</div>';
 const one=(n,depth)=>'<div class="plan-node" style="margin-left:'+(depth*18)+'px"><b>'+esc(typeLabel(n.type))+'</b>'+esc(n.title||'(untitled)')+
  (n.due_date?'<span class="plan-chip">due '+esc(n.due_date)+'</span>':'')+
  (n.priority&&n.priority!=='normal'?'<span class="plan-chip">'+esc(n.priority)+'</span>':'')+
  (n.description?'<div class="plan-desc">'+esc(n.description)+'</div>':'')+'</div>'+
  (n.children||[]).map(c=>one(c,depth+1)).join('');
 return (d.rationale?'<div class="plan-rationale">'+esc(d.rationale)+'</div>':'')+nodes.map(n=>one(n,0)).join('')}
function error(r){if(!r||r.ok===false){$('app').innerHTML='<div class="error">'+esc((r&&r.message)||'Agent unavailable.')+'</div>';return true}return false}
function render(r){if(error(r))return;STATE=r;const app=$('app');
 if(r.mode==='inference'){const q=r.inquiry;$('kind').textContent='Inference investigator';app.innerHTML=shell('<div class="prompt">'+conversationHtml(q.prompt)+'</div>'+messages(q.messages)+'<div class="draft"><label class="cap">Belief to commit</label><textarea id="draft" rows="4">'+esc(q.draft_claim||'')+'</textarea><div class="status">Model confidence: '+Math.round((q.model_confidence||0)*100)+'%. Your approval—not this number—is authoritative.</div><select id="outcome"><option value="accepted">Accept belief</option><option value="tentative">Accept as tentative</option><option value="awaiting_evidence">Needs more evidence</option><option value="rejected">Reject</option></select><div class="row"><button class="primary" id="commit">Commit decision</button></div></div>','<textarea id="reply" rows="3" placeholder="Answer, challenge, or add an example…"></textarea><div class="row"><button class="primary" id="send">Reply</button></div>');bindSend();$('commit').onclick=()=>commit({outcome:$('outcome').value,statement:$('draft').value.trim()});}
 else if(r.mode==='goal-agent'){const a=r.agent,n=r.node;$('kind').textContent=(n.type==='umbrella'?'Soul':n.type==='overgoal'?'Root':n.type==='subgoal'?'Branch':'Leaf')+' agent';app.innerHTML=shell('<div class="prompt">'+esc(n.title)+'</div><div class="hint">Bounded to this part of the tree. Changes remain staged until Commit.</div>'+messages(a.messages)+staged(a)+'<div class="row"><button class="primary" id="commit">Commit selected changes</button></div>','<textarea id="reply" rows="3" placeholder="Address the issue with this agent…"></textarea><div class="row"><button class="primary" id="send">Send</button></div>');bindSend();$('commit').onclick=()=>commit({proposal_ids:[...document.querySelectorAll('[data-p]:checked')].map(x=>+x.dataset.p),memory_ids:[...document.querySelectorAll('[data-m]:checked')].map(x=>+x.dataset.m)});}
 else if(r.mode==='goal-harvest'){const h=r.harvest,n=r.node;$('kind').textContent='Harvest '+(n.type==='umbrella'?'Soul':n.type==='overgoal'?'Root':n.type==='subgoal'?'Branch':'Leaf');app.innerHTML=shell('<div class="prompt">Harvest reusable learning from '+esc(n.title)+'</div><div class="hint">Lower harvests flow upward. Only the Soul can route distilled crossover knowledge into other projects.</div><div class="draft"><label class="cap">Harvest to commit</label><textarea id="draft" rows="16">'+esc(JSON.stringify(h.draft||{},null,2))+'</textarea><div class="row"><button class="primary" id="commit">Commit harvest</button></div></div>','<textarea id="reply" rows="3" placeholder="Tell the harvester what to revise or what it missed…"></textarea><div class="row"><button class="primary" id="send">Revise harvest</button></div>');bindSend();$('commit').onclick=()=>{let d;try{d=JSON.parse($('draft').value)}catch(e){alert('Harvest JSON is invalid.');return}commit({draft:d})};}
 else {const s=r.session;$('kind').textContent='Planning agent';app.innerHTML=shell('<div class="prompt">Shape this into a plan</div>'+messages(s.messages)+'<div class="draft" style="display:'+(s.status==='ready'?'block':'none')+'"><label class="cap">Plan to commit</label><div id="draft-view">'+draftView(s.draft)+'</div><textarea id="draft" rows="14" style="display:none">'+esc(JSON.stringify(s.draft||{},null,2))+'</textarea><div class="row"><button id="draft-toggle">Edit as JSON</button><button class="primary" id="commit">Commit plan</button></div></div>','<textarea id="reply" rows="3" placeholder="Answer in your own words…"></textarea><div class="row"><button id="prepare">Summarize & review</button><button class="primary" id="send">Continue</button></div>');bindSend();
 if($('draft-toggle'))$('draft-toggle').onclick=()=>{const ta=$('draft'),v=$('draft-view'),b=$('draft-toggle');
  if(ta.style.display==='none'){ta.style.display='block';v.style.display='none';b.textContent='Show readable plan';grow(ta)}
  else{let d;try{d=JSON.parse(ta.value)}catch(e){alert('Draft JSON is invalid — fix it before switching back.');return}
   v.innerHTML=draftView(d);ta.style.display='none';v.style.display='block';b.textContent='Edit as JSON'}};$('prepare').onclick=()=>{const p=$('prepare');p.disabled=true;p.textContent='Summarizing…';setBusy(true);
  const box=document.querySelector('.messages');let think=null;
  if(box){think=document.createElement('div');think.className='msg assistant thinking';think.innerHTML=thinkingHtml('Faerie is drafting the plan summary…');box.appendChild(think);scrollMsgs()}
  pywebview.api.prepare().then(r=>{if(!r||r.ok===false){if(think)think.remove();setBusy(false);p.textContent='Summarize & review';alert((r&&r.message)||'Could not summarize.');return}render(r)})
  .catch(e=>{if(think)think.remove();setBusy(false);p.textContent='Summarize & review';alert('Could not summarize: '+e)})};
 if($('commit'))$('commit').onclick=()=>{let d;try{d=JSON.parse($('draft').value)}catch(e){alert('Draft JSON is invalid.');return}commit({draft:d})};}requestAnimationFrame(()=>{document.querySelectorAll('textarea').forEach(grow);scrollMsgs()});}
function staged(a){const ps=a.proposals||[],ms=a.memory_candidates||[];if(!ps.length&&!ms.length)return '<div class="staged"><div class="hint">No changes are staged yet. You can still commit and close when the conversation is complete.</div></div>';return '<div class="staged"><label class="cap">Staged changes</label>'+ps.map(p=>'<div class="item"><label><input type="checkbox" data-p="'+p.id+'" checked><b>'+esc(p.type.replaceAll('_',' '))+'</b> — '+esc(p.rationale||'')+'</label></div>').join('')+ms.map(m=>'<div class="item"><label><input type="checkbox" data-m="'+m.id+'" checked><b>Save memory:</b> '+esc(m.value)+'</label></div>').join('')+'</div>'}
function scrollMsgs(){const m=document.querySelector('.chat-scroll');if(m)m.scrollTop=m.scrollHeight}
function setBusy(on){document.querySelectorAll('button').forEach(x=>{if(!['close','minimize','expand'].includes(x.id))x.disabled=on})}
function bindSend(){const b=$('send');b.onclick=()=>{
 const reply=$('reply'),t=reply.value.trim();if(!t)return;
 // Behave like the main chat: echo the user's text immediately, then show a
 // visible "writing" bubble while the model call (often ~10s) runs.
 const box=document.querySelector('.messages');let think=null;
 if(box){const u=document.createElement('div');u.className='msg user';u.textContent=t;box.appendChild(u);
  think=document.createElement('div');think.className='msg assistant thinking';think.innerHTML=thinkingHtml('Faerie is crafting a response…');box.appendChild(think);scrollMsgs()}
 reply.value='';grow(reply);setBusy(true);
 const fail=msg=>{if(think)think.remove();setBusy(false);reply.value=t;grow(reply);
  if(box){const s=document.createElement('div');s.className='sendfail';s.textContent=msg;box.appendChild(s);scrollMsgs()}else alert(msg)};
 pywebview.api.send(t).then(r=>{if(!r||r.ok===false){fail((r&&r.message)||'Agent reply failed — your text was restored, try again.');return}render(r)})
 .catch(e=>fail('Agent reply failed: '+e))};
 const reply=$('reply');if(reply)reply.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();b.click()}})}
function commit(payload){const c=$('commit'),old=c?c.textContent:'';if(c){c.disabled=true;c.textContent='Committing…'}
 const restore=()=>{if(c){c.disabled=false;c.textContent=old}};
 pywebview.api.commit(payload).then(r=>{if(!r||r.ok===false){restore();alert((r&&r.message)||(r&&r.errors||[]).join('\n')||'Commit failed.');return}pywebview.api.close()})
 .catch(e=>{restore();alert('Commit failed: '+e)})}
$('close').onclick=()=>api()&&pywebview.api.close();
$('minimize').onclick=()=>api()&&pywebview.api.minimize().then(r=>{if(r&&r.ok===false)alert(r.message||'Could not minimize.')});
$('expand').onclick=()=>api()&&pywebview.api.toggle_expand().then(r=>{if(r&&r.ok===false)alert(r.message||'Could not resize.')});
let ctxTarget=null,ctxText='';
function closeCtx(){const m=document.querySelector('.text-context-menu');if(m)m.remove()}
function editReplace(target,text){target.focus();if(/^(TEXTAREA|INPUT)$/.test(target.tagName)){const a=target.selectionStart||0,b=target.selectionEnd||a;target.setRangeText(text,a,b,'end');target.dispatchEvent(new Event('input',{bubbles:true}))}}
document.addEventListener('contextmenu',e=>{const edit=e.target.closest&&e.target.closest('textarea,input,[contenteditable="true"]');ctxTarget=edit||e.target;ctxText=edit?String(edit.value||'').slice(edit.selectionStart||0,edit.selectionEnd||0):String(getSelection().toString()||'');e.preventDefault();closeCtx();const m=document.createElement('div');m.className='text-context-menu';const rows=[];if(ctxText)rows.push(['copy','Copy']);if(edit&&ctxText)rows.push(['cut','Cut']);if(edit)rows.push(['paste','Paste']);rows.push(['select','Select all']);m.innerHTML=rows.map(x=>'<button data-act="'+x[0]+'">'+x[1]+'</button>').join('');document.body.appendChild(m);m.style.left=Math.max(5,Math.min(e.clientX,innerWidth-155))+'px';m.style.top=Math.max(5,Math.min(e.clientY,innerHeight-rows.length*38-10))+'px';m.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>{const a=b.dataset.act;if(a==='copy'||a==='cut'){pywebview.api.clipboard_write(ctxText);if(a==='cut')editReplace(edit,'')}else if(a==='paste'){pywebview.api.clipboard_read().then(r=>editReplace(edit,r&&r.text||''))}else if(edit&&edit.select)edit.select();else{const s=getSelection(),r=document.createRange();r.selectNodeContents(ctxTarget);s.removeAllRanges();s.addRange(r)}closeCtx()})});
document.addEventListener('pointerdown',e=>{if(!e.target.closest('.text-context-menu'))closeCtx()});
window.addEventListener('pywebviewready',()=>pywebview.api.state().then(render).catch(e=>{$('app').innerHTML='<div class="error">Agent failed to wake: '+esc(e)+'</div>'}));
</script></body></html>
