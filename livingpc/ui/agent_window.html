<!doctype html>
<html><head><meta charset="utf-8"><title>Faerie Agent</title>
<style>
:root{--bg:#06110c;--panel:rgba(9,29,20,.92);--line:#24543d;--fg:#dcebe2;--muted:#8ba797;--green:#45efb1;--cyan:#76e7da;--red:#ff7891}
*{box-sizing:border-box}body{margin:0;color:var(--fg);font:14px/1.5 Inter,Segoe UI,sans-serif;background:radial-gradient(circle at 70% 0,#123b2a 0,transparent 45%),var(--bg)}
header{height:56px;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--line);-webkit-app-region:drag}.brand{font-weight:700;color:var(--green);letter-spacing:.5px}.kind{color:var(--muted);margin-left:10px}.close{margin-left:auto;-webkit-app-region:no-drag}
main{padding:18px;max-width:820px;margin:auto}.prompt{font-size:18px;line-height:1.4;margin:4px 0 15px}.hint,.status{color:var(--muted);font-size:12px}.messages{display:flex;flex-direction:column;gap:9px;margin:14px 0;max-height:340px;overflow:auto}.msg{padding:10px 12px;border:1px solid var(--line);border-radius:12px;white-space:pre-wrap;max-width:88%}.assistant{align-self:flex-start;background:rgba(39,101,73,.25)}.user{align-self:flex-end;background:rgba(69,239,177,.11)}
textarea,select{width:100%;background:#081a12;color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit}textarea{field-sizing:content;min-height:68px;max-height:58vh;overflow-y:auto;resize:none;line-height:1.5}button{background:#10291d;color:var(--fg);border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer}button.primary{background:var(--green);color:#032117;border-color:var(--green);font-weight:700}button.danger{color:#ffdce3;border-color:#713044}.row{display:flex;gap:8px;justify-content:flex-end;margin-top:9px;flex-wrap:wrap}.draft,.staged{margin-top:16px;padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--panel)}label.cap{display:block;color:var(--cyan);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:7px}.item{padding:9px 0;border-bottom:1px solid rgba(70,120,90,.25);overflow-wrap:anywhere}.item:last-child{border:0}.item input{margin-right:8px}.error{color:var(--red)}
</style></head><body>
<header><span class="brand">Faerie Fire</span><span class="kind" id="kind">Agent</span><button class="close" id="close">Close</button></header>
<main id="app"><div class="status">Waking the agent…</div></main>
<script>
const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let STATE=null; const api=()=>window.pywebview&&pywebview.api;
function grow(t){if(!t||t.tagName!=='TEXTAREA')return;t.style.height='auto';t.style.height=Math.min(t.scrollHeight,Math.round(innerHeight*.58))+'px'}
document.addEventListener('input',e=>grow(e.target));
function messages(items){return '<div class="messages">'+(items||[]).map(m=>'<div class="msg '+esc(m.role)+'">'+esc(m.content)+'</div>').join('')+'</div>'}
function error(r){if(!r||r.ok===false){$('app').innerHTML='<div class="error">'+esc((r&&r.message)||'Agent unavailable.')+'</div>';return true}return false}
function render(r){if(error(r))return;STATE=r;const app=$('app');
 if(r.mode==='inference'){const q=r.inquiry;$('kind').textContent='Inference investigator';app.innerHTML='<div class="prompt">'+esc(q.prompt)+'</div>'+messages(q.messages)+'<textarea id="reply" rows="3" placeholder="Answer, challenge, or add an example…"></textarea><div class="row"><button class="primary" id="send">Reply</button></div><div class="draft"><label class="cap">Belief to commit</label><textarea id="draft" rows="4">'+esc(q.draft_claim||'')+'</textarea><div class="status">Model confidence: '+Math.round((q.model_confidence||0)*100)+'%. Your approval—not this number—is authoritative.</div><select id="outcome"><option value="accepted">Accept belief</option><option value="tentative">Accept as tentative</option><option value="awaiting_evidence">Needs more evidence</option><option value="rejected">Reject</option></select><div class="row"><button class="primary" id="commit">Commit decision</button></div></div>';bindSend();$('commit').onclick=()=>commit({outcome:$('outcome').value,statement:$('draft').value.trim()});}
 else if(r.mode==='goal-agent'){const a=r.agent,n=r.node;$('kind').textContent=(n.type==='umbrella'?'Soul':n.type==='overgoal'?'Root':n.type==='subgoal'?'Branch':'Leaf')+' agent';app.innerHTML='<div class="prompt">'+esc(n.title)+'</div><div class="hint">Bounded to this part of the tree. Changes remain staged until Commit.</div>'+messages(a.messages)+'<textarea id="reply" rows="3" placeholder="Address the issue with this agent…"></textarea><div class="row"><button class="primary" id="send">Send</button></div>'+staged(a)+'<div class="row"><button class="primary" id="commit">Commit selected changes</button></div>';bindSend();$('commit').onclick=()=>commit({proposal_ids:[...document.querySelectorAll('[data-p]:checked')].map(x=>+x.dataset.p),memory_ids:[...document.querySelectorAll('[data-m]:checked')].map(x=>+x.dataset.m)});}
 else if(r.mode==='goal-harvest'){const h=r.harvest,n=r.node;$('kind').textContent='Harvest '+(n.type==='umbrella'?'Soul':n.type==='overgoal'?'Root':n.type==='subgoal'?'Branch':'Leaf');app.innerHTML='<div class="prompt">Harvest reusable learning from '+esc(n.title)+'</div><div class="hint">Lower harvests flow upward. Only the Soul can route distilled crossover knowledge into other projects.</div><textarea id="reply" rows="3" placeholder="Tell the harvester what to revise or what it missed…"></textarea><div class="row"><button class="primary" id="send">Revise harvest</button></div><div class="draft"><label class="cap">Harvest to commit</label><textarea id="draft" rows="16">'+esc(JSON.stringify(h.draft||{},null,2))+'</textarea><div class="row"><button class="primary" id="commit">Commit harvest</button></div></div>';bindSend();$('commit').onclick=()=>{let d;try{d=JSON.parse($('draft').value)}catch(e){alert('Harvest JSON is invalid.');return}commit({draft:d})};}
 else {const s=r.session;$('kind').textContent='Planning agent';app.innerHTML='<div class="prompt">Shape this into a plan</div>'+messages(s.messages)+'<textarea id="reply" rows="3" placeholder="Answer in your own words…"></textarea><div class="row"><button id="prepare">Summarize & review</button><button class="primary" id="send">Continue</button></div><div class="draft" style="display:'+(s.status==='ready'?'block':'none')+'"><label class="cap">Plan to commit</label><textarea id="draft" rows="12">'+esc(JSON.stringify(s.draft||{},null,2))+'</textarea><div class="row"><button class="primary" id="commit">Commit plan</button></div></div>';bindSend();$('prepare').onclick=()=>pywebview.api.prepare().then(render);if($('commit'))$('commit').onclick=()=>{let d;try{d=JSON.parse($('draft').value)}catch(e){alert('Draft JSON is invalid.');return}commit({draft:d})};}requestAnimationFrame(()=>document.querySelectorAll('textarea').forEach(grow));}
function staged(a){const ps=a.proposals||[],ms=a.memory_candidates||[];if(!ps.length&&!ms.length)return '<div class="staged"><div class="hint">No changes are staged yet. You can still commit and close when the conversation is complete.</div></div>';return '<div class="staged"><label class="cap">Staged changes</label>'+ps.map(p=>'<div class="item"><label><input type="checkbox" data-p="'+p.id+'" checked><b>'+esc(p.type.replaceAll('_',' '))+'</b> — '+esc(p.rationale||'')+'</label></div>').join('')+ms.map(m=>'<div class="item"><label><input type="checkbox" data-m="'+m.id+'" checked><b>Save memory:</b> '+esc(m.value)+'</label></div>').join('')+'</div>'}
function bindSend(){const b=$('send');b.onclick=()=>{const t=$('reply').value.trim();if(!t)return;b.disabled=true;pywebview.api.send(t).then(render).catch(e=>{$('app').innerHTML='<div class="error">Agent reply failed: '+esc(e)+'</div>'})}}
function commit(payload){pywebview.api.commit(payload).then(r=>{if(!r||r.ok===false){alert((r&&r.message)||(r&&r.errors||[]).join('\n')||'Commit failed.');return}pywebview.api.close()}).catch(e=>alert('Commit failed: '+e))}
$('close').onclick=()=>api()&&pywebview.api.close();window.addEventListener('pywebviewready',()=>pywebview.api.state().then(render).catch(e=>{$('app').innerHTML='<div class="error">Agent failed to wake: '+esc(e)+'</div>'}));
</script></body></html>
